user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;
    add_header Cache-Control "no-cache";
    etag on;

    include /etc/nginx/conf.d/cache_env.conf;

    server {
      listen 80;

      location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control $html_cache_control;
      }

      location = /.env.js {
        root /usr/share/nginx/html;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
      }

      location = /version.js {
        root /usr/share/nginx/html;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
      }

      # Static assets (JS, CSS, images, fonts, media) can be cached forever because they contain content hashes
      location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control $static_cache_control;
        access_log off;
      }

      error_page   500 502 503 504  /50x.html;

      location = /50x.html {
        root   /usr/share/nginx/html;
      }
    }

    gzip_static on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_http_version 1.1;
}
