<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="<%= assetPrefix %>/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="<%= assetPrefix %>/calendar.svg" />
    <link rel="manifest" href="<%= assetPrefix %>/manifest.appdata" />
    <!--
      Notice the use of <%= assetPrefix %> in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "<%= assetPrefix %>/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <link rel="stylesheet" href="<%= assetPrefix %>/fonts/fonts.css" />

    <title>Twake Calendar</title>
    <script src="<%= assetPrefix %>/.env.js"></script>
    <script src="<%= assetPrefix %>/appList.js"></script>
    <script>
      var APP_VERSION = '2.0'
    </script>
    <script src="<%= assetPrefix %>/version.js"></script>
    <script>
      // This catches the unexpected error while loading the JS bundle
      // and shows a friendly "Please refresh" UI instead of a white screen!
      var FALLBACK_I18N = {
        fr: {
          title: 'Le calendrier a été mis à jour',
          desc: 'Actualisez la page pour charger les dernières améliorations et continuer à travailler.',
          btn: 'Actualiser'
        },
        ru: {
          title: 'Календарь обновлён',
          desc: 'Обновите страницу, чтобы загрузить последние улучшения и продолжить работу.',
          btn: 'Обновить'
        },
        vi: {
          title: 'Lịch đã được cập nhật',
          desc: 'Làm mới trang để tải các cải tiến mới nhất và tiếp tục làm việc.',
          btn: 'Làm mới'
        },
        en: {
          title: 'Calendar has been updated',
          desc: 'Refresh the page to load the latest improvements and continue working.',
          btn: 'Refresh'
        }
      }

      function showFallbackUI() {
        var lang = (localStorage.getItem('lang') || 'en').split('-')[0]
        var t = FALLBACK_I18N[lang] || FALLBACK_I18N['en']
        var errorUI =
          '<style>' +
          'body{margin:0}' +
          '.fallback-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:#fafafa;padding:24px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}' +
          '.fallback-paper{background-color:#fff;border-radius:16px;padding:48px;text-align:center;max-width:420px;width:100%;box-sizing:border-box;box-shadow:0px 3px 3px -2px rgba(0,0,0,0.2),0px 3px 4px 0px rgba(0,0,0,0.14),0px 1px 8px 0px rgba(0,0,0,0.12)}' +
          '.fallback-icon{color:#F67E35;width:72px;height:72px;margin:0 auto 16px auto;display:flex;align-items:center;justify-content:center}' +
          '.fallback-icon svg{width:40px;height:40px;fill:currentColor}' +
          '.fallback-title{margin:0 0 16px 0;font-size:1.5rem;font-weight:600;color:rgba(0,0,0,0.87)}' +
          '.fallback-desc{margin:0 0 24px 0;font-size:1rem;color:rgba(0,0,0,0.6);line-height:1.5}' +
          '.fallback-btn{background-color:#F67E35;color:#fff;border:none;padding:8px 24px;font-size:0.875rem;font-weight:600;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0px 3px 1px -2px rgba(0,0,0,0.2),0px 2px 2px 0px rgba(0,0,0,0.14),0px 1px 5px 0px rgba(0,0,0,0.12)}' +
          '.fallback-btn:hover{background-color:#E55B31}' +
          '.fallback-btn svg{width:20px;height:20px;fill:currentColor}' +
          '</style>' +
          '<div class="fallback-container"><div class="fallback-paper">' +
          '<div class="fallback-icon"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"></path></svg></div>' +
          '<h1 class="fallback-title">' +
          t.title +
          '</h1>' +
          '<p class="fallback-desc">' +
          t.desc +
          '</p>' +
          '<button class="fallback-btn" onclick="window.location.href=window.location.pathname">' +
          '<svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"></path></svg>' +
          t.btn +
          '</button>' +
          '</div></div>'
        document.body.innerHTML = errorUI
      }

      window.addEventListener(
        'error',
        function (e) {
          // Catch syntax errors (Unexpected token '<')
          var isUnexpectedToken =
            e.message &&
            (e.message.includes("Unexpected token '<'") ||
              e.message.includes("expected expression, got '<'"))
          var isScriptError = e.filename && e.filename.indexOf('.js') > -1

          // Catch asset loading network failures (404s)
          var isNetworkError =
            e.target &&
            (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')
          if ((isUnexpectedToken && isScriptError) || isNetworkError) {
            showFallbackUI()
          }
        },
        true
      )

      window.addEventListener('unhandledrejection', function (e) {
        // AbortErrors are intentional (SSO redirect in progress, cancelled fetches)
        if (e.reason && e.reason.name === 'AbortError') return
        // Only intervene when React has not rendered anything — i.e. a true blank page
        var root = document.getElementById('root')
        if (root && root.children.length > 0) return
        showFallbackUI()
      })
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
